  text: 上清靈寳大法總序獸一甞聞無極之先混融莫測洪濛之始清濁方形圓穹上浮渺渺浩劫自然之氣宗主元綱乾旋坤鎭而萬𩔖生運啓化興而五文煥萌於天上者凝雲結篆降於人世者譯而成章發道德之機縁作神仙之梯級粤自龍漢教以大乗迨乎延康授之中品故洞玄之緒神化大宏後世之見於用者齋修章表出焉而其科條訣法符篆神文散之羣書蓋洞玄之部品目繁多詞章浩博惟度人之一卷備拯濟之深樞内而錬行修仙可以登眞度世外而立功蕆事可以福顯利幽隱訣靈音悉存經内其如理𦤺幽晦世未能詳中世以降析請多門宋簡寂先生陸君修靜分三洞之源列四輔之目述科定制漸見端緒至唐廣成先生杜君光庭遂按經誥修成黄籙齋科四十卷由是科條大備典格具彰跨古越今以成軌範當其成書露剌之日上符玄穹昭𠃔之祥天下後世罔敢越此至如符篆文移則非齋科所載行教之士轉相傳授於是纂聚中洞諸經符呪訣目集以成書而實宗于度人之一卷惟經乃法中之本而法乃經之用法岀於靈寳而𨽻乎洞玄故謂之靈寳大法由是經典之內凡可以開度亡爽利祐生民符書法術莫不兼收並録燦然聮屬矣俾嗣法之人不勞餘力如古者齋法上品功用則端嘿動天存思格物固非常人之可遽行其餘齋法通悃逹誠章詞爲首後世増以文檄關申實體世法而爲之以輔章文之所不及旣有法軄則以洞玄部之籙冠其首法籙相應以爲階䘖聞奏上玄通逹三界不得不備儀式爾旣立階位又列文移於是印篆不可無也及夫得道登升自有上天眞軄如許旌陽爲都仙太史劉寛爲童初上帥正一天師得老君玉印費長房受壷公符籙此乃天𢌿神授所謂仙軄眞印是也今應世行科佩籙嗣法不過師傳啓修眞之漸門開立功之要路固不在乎印篆之繁軄位之髙也靈寳大法近者編述多門有百二十卷者似乎過詳未免三洞經典通取以入其中福唐王升卿編作二十卷頗爲適中然多應世之科亦分列曹局及有預修之齋頗無經據似此等不無大醇而小疵又有只編二十卷者深爲簡當而初授科法之士多患不知根源舊有隨經編法者乃依經中之儀製而爲用乃是宗本而世又指爲度人大法或稱靈寳經中别爲異途凡世之流傳者多門未可盡覩雖未能悉契靈㫖大綱亦粗可按行耳紹興之後淛江以東多宗天台四十九品不究前軰編集之本意首於序中直云靈寳大法者三十六部尊經之首九品仙眞神靈之根指法中編集之辭俱是上帝口宣之語殊不知符檄齋修醮設書禁驅治祈請鎭禳悉是中古之後因事立儀隨時定制輔翊元化賛助靈風非以爲法出於後世而不可行乃其採諸經之要妙搜衆典之符章亦有遇異人之付傳亦有蒙神仙之授受凡可以立功宏化者集爲中乗之法却非上古之世天帝之言而毎叙事之條見其間稱玄師曰遂將上帝品排謂救苦天尊爲玄師彼蓋將以爲一言一論悉岀於天尊其不加詳審𩔖多如此惟本源之旣失故體格之益訛是𦤺於符章也欲其異於印篆也欲其多於法軄也極其崇於行用也肆其詐及其授受之際捧一編之書轉相沿襲師弟子略不深究博詢問辯攷證迷以傳迷自神其說且夫玄元始三氣爲萬化之根宗自三氣肇而奠二儀二儀定而生萬物人禀中和之全氣故像天地之大體及其氣血運動宻契隂陽是人身法天地而生成非以此身其爲天地也修錬之㫖有存三守一之門即章文遣馭之所宗以氣合氣以神感神覬天人交通於恍惚之間其事非稍知道者不足與聞法中略露其微意台山書中不同其㫖乃取他處飛玄三氣印編入法中以發奏牘使其印有所出亦與洞玄之籙靈寳之法了不相屬又不知氣可飛玄則將升神矣况三氣之妙非可刻之印間近來行其法者又自相矛盾印名同而篆文異者尤衆甚至以經中之字合而爲印者不可備數夫印者信也文移申發以示記識如世之張官置吏有一官則一印上而君父下而士民莫不認以爲表誌也如行天心正法則以驅邪院印爲記是行正法之科條備驅邪院之屬吏故此印發文移也如籙進洞玄之品法以靈寳爲軄舊儀只稱三天門下南曹又以靈寳大法司爲曹局故以其印而發文移是本局之信記也今又益以太上三天之印旣曰三天又曰太上非籙之階又非法之軄此特摘其礙理之甚者此外紛紛碌碌不知其幾印可惜謬用其心也邇來博古之人亦嘗有著述儀範科條者矣乃復取天台法中之符文印篆雜入其中玉石混淆邪正交錯至於軄位世人旣未際眞授未免佩籙於宗壇求法於師友以籙爲階以法爲軄亦行教者不得不用耳天台法中乃稱領教嗣師或自稱宗師復立玉陛仙卿太極眞宰取以繫䘖大可驚畏且人之爲物禀受冲粹成茲一靈迨夫卑形不過父母氣血結爲胚胎及其長也百榖衆物養其軀體自微至著無非土滓故雲房三十九章詩中有云四大一身都屬隂不知何物是陽精蓋言人之五體百骸血津骨肉莫非隂𩔖上士能修元錬本隂盡陽淳如天之清乃仙之品猶未免受書洞府效軄仙曹及其飛升輕舉尚須攷證功過量校數目方遂高歩雲烟騰翔霄漢仙眞等級誠爲不輕季世凡夫地行濁質佩籙傳法則地界行教之司而已五氣三雲未徹修存之妙理九還七返莫全冶錬之深功衮衮塵途前期匪測淊淊俗浪宿命難知升舉之期可謂逺矣而乃遽稱大位自處仙眞用以爲䘖瀆天罔道仙卿眞宰豈地界治官之可當哉如醮告斗以伸祈禳則靈寳大法中之一事也在二十四等之中只名北斗除灾醮而已天台之行靈寳者欲别立門戸以傳於人因見宣和間有璇璣之籙故集諸家之說以爲璇璣之法别立玄靈璇璣府印編末却歷言所本如北斗經傍通圖諸書皆列其後雖法中言辤出於衆書而立爲此印又誰爲之耶䘖位稱主管璇璣府事子生人則稱太上宫察訪使是何說也使有璇璣之府亦斗星之宫爾人而主管之已與斗星同列矣察訪之官漢魏尚未有之後世朝廷廉使之任非道法之階殊不知受正一之籙行天心正法則通逹誠祈謄詞醮斗有何不可以𦤺遷入洞玄法籙則北斗醮乃法中之一事又待别立一䘖方可主行哉儻每一等齋則易一軄一品醮則更一御如此則古科二十七品之齋四十二等之醮當𥙷數十等軄位乃可奉行不期紛紛耶使其軄位之合典格凡主行齋醮進章拜表禱雨祈晴濟死度生無所不通又何必多立各稱廣易御位大抵法籙階位所以備儀式符章印篆所以是表誌今以印篆階軄一至於此其有不存于編而用行矯僞者如建齋醮之初髙功大書揭示稱已於某日黙朝上帝啓告齋事可謂不經且留形住世之術惟金丹一法最爲正理修仙之事所當究心自此之外如錬氣飡霞服丹餌藥收光吐納熊經鳥伸其𩔖不一而未可俓得鉛凝汞結内就金丹故謂之三千六百傍門小法黙朝上帝是其一也蓋於身中升降運用極於泥丸成者可以却疾延年失者未免動神損志然專修此法近來成就者亦希非可以通天徹地而成眞者也若夫火棗內榮隂魔外絶與道爲一身外生身升神而面朝九清洞視而遐觀萬彚此則靈寳中見玉清聖境之時形神俱妙隔絶囂塵徯數待期俓登金闕得至此者必不行科應世身入齋壇旣能躬覿天眞則章表文移折旋音韻一切不用此又非黙朝上帝例矣今方崇壇廣席設像陳儀牘盈編謄章表是齋修之品格却稱黙朝上帝謂能面陳意於天且人可罔也天可欺乎編中鋪聚多乖正理其書起自南渡之初迄今將百載邪說異論幾徧浙東歲月浸深傳流漸廣後學之事習以爲常亂敗典章靡有窮已太上之教尊之而不加貴毀之而不加卑固不待辯是折非然之後昭顯第以其法行齋用事違格失經非獨書罪於三官五帝之司而天下後世豈無逹誠之士將有秦無人之譏欲加考正又恐貽怒於其襲法之徒故坐視神文之被穢莫敢一言也𠃔中每觀其窒礙形神爲之震懼初非以理推測已見臆度蓋戾古畔科雖三尺之童平心以觀亦覺其謬𠃔中幸免陷身於邪僞之門終不認後人之被誤敬遵師傳之要㫖兼攷諸家之成書務合古儀略加編集似失退遜而𠃔中之管見實謂居其軄而任其事矧佩籙傳符久叨靈䕃冠星披羽粗集冲科雖非上天眞授之班實玷地界軄司之列兼戴髮含齒賦性立形一切一毫莫非元始祖氣皇天之貺大道之休顧不重耶是居其軄而不任其事可乎由是不恤謗議粗作編聮使𠃔中之言稍合科條則其與同學共之或𠃔中之言有違典格則冀髙人正之是以略序其始末於卷首𠃔中不敢故爲險論以是已非人不過略刪其續撰頗從舊䂓合理而有源不厭其凡俗背科而無據不貴其新竒蓋以陸簡寂分三洞四輔爲别以杜廣成立經定制爲宗然後公其說以定其法是謂言之者無罪聞之者足以戒然𠃔中見近世編録法書悉隱其機要爲度師者雖自無所得而不應禁祕之文亦委曲隱落甚至减易古書除削舊法欲令不全逐時出竒賣祕以邀求嗣法第子此不獨靈寳齋法其餘法書莫不皆然世態澆漓一至於此大抵靈機妙𧷤便可飛升輕舉者固不當顯書廣泄如濟世立功接人利物之用豈冝略不具載𠃔中於出世之法登升之訣未之聞也但世之所行幸頗識邪正今成是編深以市道爲戒不敢故行𨼆落凡靈寳之修存功用救苦齋修亦已備述不至大段踈闕理當而有據者一毫不遺論恠而無根者雖詳不録意義相續者不分兩卷法之相須者不敢離析舊書分散則取而序之事渉别書則攷而𥼶之䟽出條目悉可按行所其法中科禁至重自來不存簡䇿者亦備存條目成書之後録奏上玄告聞三界對天立願廣宏至教爲學之士冝廣見聞况今名山福地僻境遐方隱跡林泉混塵朝市有道之士豈無其人患不能廣叅徧歷别識仙眞而已第亦須稍知今之諸方在家出家嗣行靈寳者多矣而靈寳之法今又幾家然後攷自己之所得邪正淺深亦不可略見假使專執先入之說而非他人身坐井中而作天論則非有心於教者矣學者更能平其心志審其端緒母𦤺日趨於乖眞叛道之途實𠃔中之至願也𠃔中經籍度三師乃中原之宗𣲖巳叙其姓名於卷末𠃔中非敢出私見以誑世人蓋以師授之㫖多口傳而心記恐歲久泯没故次序古書而略隱於其中爲教門而設也洞玄靈寳弟子南曹執法典者權童初府右翊治金𠃔中序上清靈寳大法目録
