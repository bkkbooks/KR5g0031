body:
  text: 洞玄靈寶法師南曹執法典者權童初府右翊治金𠃔中編本法戒律品本法十戒經中十二善論法以戒律為先其戒條不必訓𥼶恐失本㫖七事區貫品發明經中七事論七事乃經中之大體四譯成書品譯字成經節次論别本稱五譯出於誑妄經文序例品安鎮國祚四條上消天灾五條下禳毒害三條升舉之例一十三條功德應感一十七條傳度盟授一條泄慢獲罪三條論别本以序例為密告大不當理分章𥼶用品叙玄章第一啓運章第二真應章第三定極章第四還元章第五重玄章第六演梵章第七宣祕章第八上聖章第九至學章第十勸學章第十一讃玄章第十二條誦章第十三上學章第十四暢微章第十五效盟章第十六玄局章第十七三元章第十八行道章第十九洞玄章第二十赤文章第二十一大梵章第二十二梵氣章第二十三招真章第二十四寶諱章第二十五受度章第二十六衛真章第二十七玉曆章第二十八流化章第二十九升玄章第三十契玄章第三十一成真章第三十二挹華章第三十三天寶章第三十四普護章第三十五隂錬章第三十六保鎮章第三十七至言章第三十八大洞章第三十九感應章第四十論别本以分章為訓解不識義理七經八緯品七經之條八緯之目論别本不載七經之條其八緯之目大不同元綱流演品叙流演之源元綱升神之路體合人身元綱流演圖二升神飛步朝謁祕法論别本升神朝謁止以泥丸為上天大失本㫖玄穹主宰品三境所治昊天北極天皇所論别本所攺上帝名稱不合經典三界宫曹品上界諸天宫府中界山嶽地府下界水府治職論别本以經中一句作一司撰造將吏名目攺壞經誥不便朝元入靖品崇例聖位入靖朝元科式論私立靖名不便誦持存思品沐浴等呪入室存思發爐引氣誦經中復官論世俗於經中增添呪語非理及內外相應不偏廢玉札靈章品玉札四十九字服玉札口表論别本所載一百五十六字非舊式及其口表淺近不文理三晨芒耀品玄真經存日月法太虛真人赤君內法東華真人服日月象法上清紫文吞日氣月精法飲斗光法服日光法服月光法論别本攺去三光之明礙理五行正氣品服斗星名六字治病服字內注六丁六甲遣妖訣八符治毒法每符二字晦日服字法三字朔日誦字法五字論當以內應外感為宗他書增入移景通光法非本㫖五芽內錬品五芽真文服存呪法常服法論别本以五芽經作五藏失本㫖三宫修誦品默誦經法三宫各有所主論别本以三天配正月七月十月失本㫖以默誦於內誦及撰梵語洞經礙理洞照幽徹品靈寶玉鑑移景通光照洞玄寶鑑靈寶洞玄照速度亡魂訣論驅祟先冝開度元始太定品定息積力祕訣論别本謂天尊止在泥丸違失經㫖及為光怪之說不便洞觀百靈品徹視法內梘中方論後世以開光考照為洞觀非本㫖採錬祖氣品採錬止有條目訣法未降論法止錬本身祖氣訣法未降不可意料曲為之說洞陽符火品六十四卦配合靈書訣法未降九氣包鼎訣法未降論别本以配卦為玄真隱諱非是五氣混合品中理五氣條目訣法未降九宫七星圖訣法未降論别本所載混合百神一章無可行法流精玉光品迎日光為丹大略訣法未降論别本所說於古法小異要之非可行之訣梵氣流行品梵氣之行合於人身大略訣法未降論别本所論不同黍珠神變品調息進火內錬黍珠訣法未降論别本誦經十遍成丹非本㫖齊直禁忌品元㑹節序日避忌日禁食厭物李少君口訣本命日修用呪訣淨穢法解穢法式假解穢常用呪言論别本所隱經論未善本法印篆品靈寶大法司印通章印神虎三印黃神印越章印論世俗增印太多名稱失格階法職品仙班五等論法職當存籙階次補本法之職不冝僣妄過謝愆品祝香啓白五方懴悔三禮回向出戶論别本所編錯雜科文亦難宣讀五品隂功品靈寶壇星宿錯度日月失昏格四時失度隂陽不調格國主有灾兵革四興格疫毒流行兆民死傷格師友命過格三晨象上真星宿好樂太乙好樂九鼎名論别本攺易壇名及鎮禳之法皆異於經濟生陽德品玄樞三晨壇解治法飛斗北斗符南斗符和合年命符斗星名符七元祕授符飛神入斗法論别本所叙失古法祭錬幽魂品祭錬本源造斛及合用之物祭錬日早晨口奏重撰白文早晨預白將吏書生天籙并訣水火符變食符靜夜行事啓請重撰白文召將變食召六道四生孤魂重撰普召文呪食水火二錬法三皈九戒度魂焚燎重撰告遣孤魂白文事畢謝聖重撰口奏祝願白文每日出飯小施食儀論舊科施食後誦殺鬼呪非便丹陽符不出於本法中驅妖拯厄品除邪法有符驅捉法真文併符召神王法鎮禳法有符解度法有符三部符法驗祟九宫法論别本立總治幽冥品非本旨裂字為符品古法裂字止有三十一符天篆符二十六出靈書內論别立符名非古法黃籙次序品序齊修齊節次預告揚幡誦經發奏拜章告符發玉札告齊投詞立幕勑水請光宿啓破獄正齊三日醮謝散壇論格式止從古科修齊受詞品投狀式齊官請髙功重撰𥘉請語法師答辭重撰辭遜語齊官再拜重撰勸請語髙功再辭重撰再辭語齊官三請重撰三請語法師答從請重撰受辭語法師口奏重撰白文論三辭乃是重其事揚幡科式品遷神幡式回耀幡式重撰揚幡儀論世俗廣添幡式頗為不經鎮信威儀品金龍𥼶義鎮綵𥼶義𥿄墨筆硯等𥼶義香花𥼶義鎮米𥼶義鎮炭𥼶義鎮錢𥼶義槿木簡式并𥼶義玉璧𥼶義金紐𥼶義威儀十二事章函制度香爐几案論鎮信𥼶義並從廣成先生科式壇圖幕式品壇圖二壇外燈圖二十八宿星象圖壇制門榜六幕九祖位土地位監壇神位神虎堂錬度堂聖位誦經堂靖堂室茭郭齊供論世俗六幕位次髙下與古儀不同玉文真篆品五老赤書玉字真文行赤書法水府嶽府土府呪五嶽投簡呪安鎮星宿禳度天灾呪攝召法呪召龍天水神止水度水呪廣成先生叙說靈書三十二天隱語真文收靈書真文呪論赤書玉字乃投簡之本源登齊科範品發奏請牒重撰功曹三獻儀告符重撰啓奏白文告符發玉札重撰將吏三獻儀投詞告齊請髙功升壇重撰白文髙功白衆撰白文四結願髙功出請先詣監壇神前重撰白文次詣師幕請師拜箋各幕重撰白文升壇表白開啓重撰白文請光分燈並依古式仍重撰白文論近世雜科太近俗者不冝用三朝失時尤戾古典臨壇符法品降真召靈符法三晨慧光符入戶出户呪升壇儀式禮師𥼶義五方衛靈呪𥼶義晨午晚三朝存思法并𥼶義齊壇三寶位次鳴法鼓說發爐并𥼶義三上香密呪并𥼶義焚降召符法御案說上本位香𥼶義命魔呪法并𥼶義論命魔步虛之法古有奧義論分燈符式不同章詞表牘品素車白馬章酆都拔罪章開通道路章論開通道路章并拔罪章皆不必歷陳地獄名升度亡魂章沐浴錬度章章函章几制度書章法章信章關式獻章中官將狀式黃素朱表論今人齊修多不能廣度却用朱表古式其詞不相合建黃籙以普度為功重撰救苦表重撰請隂陽正氣錬度表重撰九天上帝表青詞格式論撰詞表當知體格不冝用世俗變體雜說失格者不當備奏上章科格品淨外穢沐浴法淨內穢服符法服心章告心神法上章燒香爐內符章前後空𥿄式靈寶詞章儀重行校定章中官將聖位論洞玄部靈寶拜章不應雜以他法六幕啓謝品啓玄師箋啓五帝箋啓三官箋啓天師箋啓三師箋啓監齊箋謝玄師箋謝五帝箋謝三官箋謝天師箋謝三師箋謝監齊箋已上六幕啓謝箋並重撰述論六幕合用箋文五帝稱號更行考證奏申文檄品奏狀式上帝合用奏狀例上界天真合用申例上界申狀式中下界申狀式二等牒式功曹將吏用關子例關子式劄子式黃籙預告奏申六狀并牒式黃籙正奏一十四狀式正申上界二十八狀并二牒式正申中界三十二狀并一十二牒式正申下界一十一狀并一十六牒式神虎召魂牒七玉女牒催召牒拘集孤魂普召牒給散孤魂錢簡籙關遣發奏申文檄關帖引共十式告發諸符關共三式功德牒式三等獻醮狀并關子式天省五府謝過狀二式重撰齊壇節次榜經壇榜曉諭將吏榜神虎壇榜率勵壇官榜曉諭孤魂榜論黃籙齊後醮謝不必再發請狀及醮獻聖位冝照文移關係之所並合與醮及地獄不當移文升度符告品救苦真符長生靈符金龍驛吏符茭龍驛吏符青宫九龍符命破地獄符拔幽魂符登真度命出離生死符太上勑赦生天寶籙元始符命普告三界符歷關諸天符勑制地祇符古法四鎮合同靈寶升天大劵升天左劵升天右劵洞玄靈寶長生度命黃籙論符之本㫖世俗用符冗雜悉非正理及以鬼魂命終之因撰符不便别法中符不應入受持䇿杖品造䇿杖法受持䇿杖法五嶽符十天玄化符五帝直符論䇿杖當平居呪持然澄破獄品重撰破獄啓白文九幽破獄燈儀髙功存念行用法九清梵唱破獄呪破獄燈圖破獄步罡式論普度方可破獄神虎攝召品叙神虎所屬之府官將位次壁魯洞銘文鐵跡臺光之章入門壇式斗章召魂幡上二符三部使者符神虎玉札七玉女符陽耀通關壇隂靈攝𩲸壇神虎攝魂符幽寂符天皇印訣神虎罡芻身升度法神虎服色重撰告玉扎神虎三獻儀重撰發催召儀論神虎召魂隨所得之法以行水火錬度品正薦沐浴儀呪食呪白文水火方位髙功升座祝香文水火錬度儀正薦傳戒儀度魂儀并回向文錬度合用符篆日魂符真火合同符火鈴符錬身符月𩲸符真水合同符十二河源符五芽真文金液錬形符石鏡水母符生神九章符玉纓神變符酆都山形論錬度世用雜符太多酆都山形不冝以私意增益施食普度品髙功奏啓重撰普召六道儀孤魂沐浴儀孤魂朝真啓白呪食遍諸方通用呪髙功升座祝香語錬度孤魂重撰髙功告白文孤魂錬度儀孤魂傳戒儀度魂回向白文論建齊當重於普度近者世俗科書太鄙陋者不冝輕用散壇設醮品古科條目叙醮黃籙醮謝真靈三百六十聖位又一百六十醮位論五帝稱號冝隨其所寓黃籙大齊散壇設醮儀散壇拜表設醮禮畢論三洞經典近世散失不備世俗不當暗毀廣成先生齊科投龍送簡品下元黃籙簡文述玉札金龍等式科文𥼶龍璧等說科文式投三簡法玉簡金龍玉璧金紐制度山簡告文真文水簡告文真文土簡告文真文投簡設醮圖靈山福地投龍簡醮儀靈泉江海投龍簡醮儀齊壇投土簡醮儀叙三元八節投簡式廣成先生科叙黃籙投簡說論投簡出真文玉訣本於五老赤書今用别符於簡後不合經科傳度對齊品授受之格投師狀式申奏大略格式三界清醮狀式三界醮獻狀式傳度合用靈書真劵式環式龍頭書刀式𥙷職帖式發奏節次靈寶對齊設醮傳度儀上清靈寶大法目録
